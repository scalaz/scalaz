name: CI
on:
  pull_request:
  push:
    branches:
      - "series/7.3.x"
defaults:
  run:
    shell: bash
jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        project: [rootJVM, rootJS, rootNative]
        java: [11, 25]
    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-java@v5
      with:
        java-version: ${{matrix.java}}
        distribution: adopt
    - uses: sbt/setup-sbt@v1
    - run: |
        sbt -v \
        checkGenTypeClasses \
        "project ${{ matrix.project }}" \
        "Test/compile" \
        "mimaReportBinaryIssues" \
        $(if [[ "${ matrix.project }}" == "rootJS" ]]; then echo "Test/fastOptJS"; fi)
    - run: |
        sbt -v \
        "project ${{ matrix.project }}" \
        "test" \
        "project /" \
        $(if [[ "${{ matrix.project }}" == "rootJVM" ]]; then echo "publishLocal"; fi)
    - run: |
        case ${{ matrix.project }} in
          "rootJVM")
            ./sbt -v \
               "project exampleJVM3" \
               runAllMain \
               "project exampleJVM2_13" \
               runAllMain \
               "project exampleJVM2_12" \
               runAllMain
            ;;
          "rootJS")
            ./sbt -v \
               "project exampleJS3" \
               runAllMain \
               "project exampleJS2_13" \
               runAllMain \
               "project exampleJS2_12" \
               runAllMain
            ;;
          "rootNative")
            ./sbt -v \
               "project exampleNative3" \
               runAllMain \
               "project exampleNative2_13" \
               runAllMain \
               "project exampleNative2_12" \
               runAllMain
            ;;
          *)
            echo "unknown project"
            exit 1
        esac
    - run: rm -rf "$HOME/.ivy2/local" || true
