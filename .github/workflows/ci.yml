name: CI
on:
  pull_request:
  push:
    branches:
      - master
jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        project: [rootJVM, rootJS, rootNative]
        java: [17, 25]
    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
      with:
        java-version: ${{matrix.java}}
        distribution: zulu
    - uses: coursier/cache-action@v8
    - run: ./sbt -v
           -Dcheck_build_file_imports
           checkGenTypeClasses
           "project ${{ matrix.project }}"
           Test/compile
           $(if [[ "${{ matrix.project }}" == "rootJS" ]]; then echo "Test/fastOptJS"; fi)
    - run: ./sbt -v
           "project ${{ matrix.project }}"
           test
           "project /"
           $(if [[ "${{ matrix.project }}" == "rootJVM" ]]; then echo "publishLocal"; fi)
    - run: |
        case ${{ matrix.project }} in
          "rootJVM")
            ./sbt -v \
               "project exampleJVM3" \
               runAllMain \
               "project exampleJVM2_13" \
               runAllMain
            ;;
          "rootJS")
            ./sbt -v \
               "project exampleJS3" \
               runAllMain \
               "project exampleJS2_13" \
               runAllMain
            ;;
          "rootNative")
            ./sbt -v \
               "project exampleNative3" \
               runAllMain \
               "project exampleNative2_13" \
               runAllMain
            ;;
          *)
            echo "unknown project"
            exit 1
        esac
    - uses: mikepenz/action-junit-report@d9f48fc87bc235f7e214acf696ca5abc0a986f16 # v6.4.2
      if: always()
      with:
        report_paths: '**/test-reports/*.xml'
        require_tests: true
        check_name: "${{ matrix.java }}-${{ matrix.project }}"
    - uses: test-summary/action@v2
      if: always()
      with:
        paths: '**/test-reports/*.xml'
    - run: rm -rf "$HOME/.ivy2/local" || true
  latest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
      with:
        java-version: 25
        distribution: zulu
    - uses: coursier/cache-action@v8
    - id: scala_3_version
      run: echo "value=$(cat .github/scala_3_latest.txt)" >> $GITHUB_OUTPUT
    - run: ./sbt -v
           -Dscalaz_scala3_version="${{ steps.scala_3_version.outputs.value }}"
           "print rootJVM/scalaVersion"
           Test/compile
  wasm:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
      with:
        java-version: 25
        distribution: zulu
    - uses: actions/setup-node@v6
      with:
        node-version: 26
    - uses: coursier/cache-action@v8
    - run: ./sbt -v
           -Dscala_js_wasm
           rootJS/Test/compile
           rootJS/test
