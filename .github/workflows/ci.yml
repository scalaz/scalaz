name: CI
on:
  pull_request:
  push:
    branches:
      - "series/7.3.x"
defaults:
  run:
    shell: bash
jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        project: [JVM, JS, Native]
        scala: [2_12, 2_13, 3]
        java: [17, 25]
    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-java@v5
      with:
        java-version: ${{matrix.java}}
        distribution: adopt
    - run: ./sbt -v
           checkGenTypeClasses
           "...${{ matrix.project }}${{ matrix.scala }}/Test/compile"
           "...${{ matrix.project }}${{ matrix.scala }}/mimaReportBinaryIssues"
           $(if [[ "${{ matrix.project }}" == "JS" ]]; then echo "...${{ matrix.project }}${{ matrix.scala }}/Test/fastOptJS"; fi)
    - run: ./sbt -v
           "...${{ matrix.project }}${{ matrix.scala }}/test"
           "project /"
           $(if [[ "${{ matrix.project }}" == "JVM" ]]; then echo "publishLocal"; fi)
    - run: rm -rf "$HOME/.ivy2/local" || true
